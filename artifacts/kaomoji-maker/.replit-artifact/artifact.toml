kind = "web"
previewPath = "/"
title = "Kaomoji Maker 顏文字製作器"
version = "1.0.0"
id = "artifacts/kaomoji-maker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22307

[services.development]
run = "pnpm --filter @workspace/kaomoji-maker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kaomoji-maker", "run", "build" ]
publicDir = "artifacts/kaomoji-maker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22307"
BASE_PATH = "/"
